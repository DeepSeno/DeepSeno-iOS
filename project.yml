name: DeepSeno
options:
  bundleIdPrefix: com.enmooy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
schemes:
  DeepSeno:
    build:
      targets:
        DeepSeno: all
        DeepSenoTests: [test]
    test:
      targets:
        - DeepSenoTests
    run:
      config: Debug
      executable: DeepSeno
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.5.2"
    CURRENT_PROJECT_VERSION: 8
    DEEPSENO_DEVELOPMENT_TEAM: ""
    DEEPSENO_BUNDLE_ID: "com.korteqo.app.ios"
    DEEPSENO_RELAY_SERVER_BASE_URL: ""
    DEVELOPMENT_TEAM: "$(DEEPSENO_DEVELOPMENT_TEAM)"
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"
    RELAY_SERVER_BASE_URL: "$(DEEPSENO_RELAY_SERVER_BASE_URL)"
targets:
  DeepSeno:
    type: application
    platform: iOS
    sources:
      - DeepSeno
    settings:
      base:
        INFOPLIST_FILE: DeepSeno/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: "$(DEEPSENO_BUNDLE_ID)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # CODE_SIGN_ENTITLEMENTS: DeepSeno/DeepSeno.entitlements
    info:
      path: DeepSeno/Info.plist
      properties:
        CFBundleDisplayName: DeepSeno
        CFBundleName: DeepSeno
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "DeepSeno needs microphone access to record audio"
        NSCameraUsageDescription: "DeepSeno needs camera access to capture photos and videos"
        NSSpeechRecognitionUsageDescription: "DeepSeno uses speech recognition for voice input"
        NSLocalNetworkUsageDescription: "DeepSeno connects to your desktop app on the local network"
        RelayServerBaseURL: "$(RELAY_SERVER_BASE_URL)"
        NSBonjourServices:
          - "_deepseno._tcp"
          - "_korteqo._tcp"
        # Public relay uses a self-signed HTTPS cert on a public IP. With
        # NSAllowsLocalNetworking present, iOS forces system trust validation
        # for public IPs (-9802) and IGNORES PinningDelegate's useCredential,
        # so the handshake is rejected before pinning can accept it. Use only
        # NSAllowsArbitraryLoads (a superset that still permits LAN/Bonjour) and
        # let PinningDelegate own cert verification. See commit 313ea13.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    # Share extension temporarily disabled for debugging
    # dependencies:
    #   - target: DeepSenoShareExtension
  DeepSenoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DeepSenoTests
    dependencies:
      - target: DeepSeno
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: "$(DEEPSENO_BUNDLE_ID).tests"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DeepSeno.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DeepSeno"
        BUNDLE_LOADER: "$(TEST_HOST)"
